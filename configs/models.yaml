# Model definitions for FIN-bench-v2 evaluation pipeline
#
# local_models: models run via local inference scripts
#   - path: absolute path to the model file or directory
#   - runtime: "mlx_lm" (Apple Silicon) or "llama_cpp" (Windows/Linux/Intel Mac)
#   - model_key: used to resolve max_tokens from run_settings.yaml
#
#   mlx_lm  → run_eval_jsonl.py  — requires Apple Silicon (M-series)
#              path points to a model directory (mlx-community format)
#
#   llama_cpp → run_llama_jsonl.py — works on Windows, Linux, Intel Mac,
#               and Apple Silicon; supports NVIDIA/AMD/CPU via --n-gpu-layers
#               path points to a single .gguf file
#
# frontier_models: models run via run_frontier_jsonl.py (API providers)
#   - model_id: identifier passed to the provider API
#   - runtime: corresponds to --provider in run_frontier_jsonl.py
#   - env_var: environment variable holding the API key (set in .env)

local_models:
  # --- Apple Silicon (MLX) ---
  gemma4_mlx:
    label: "Gemma 4 26B (4-bit, MLX)"
    path: "/path/to/your/models/gemma-4-26b-it-4bit"   # update to your local path
    runtime: mlx_lm
    model_key: gemma4
    notes: "Download: huggingface-cli download mlx-community/gemma-4-26b-it-4bit"

  gemma3_mlx:
    label: "Gemma 3 27B IT (QAT 4-bit, MLX)"
    path: "/path/to/your/models/gemma-3-27b-it-qat-4bit"   # update to your local path
    runtime: mlx_lm
    model_key: default
    notes: "Download: huggingface-cli download mlx-community/gemma-3-27b-it-qat-4bit"

  gemma4e4b_mlx:
    label: "Gemma 4 E4B (4-bit, MLX)"
    path: "/path/to/your/models/gemma-4-e4b-it-4bit"   # update to your local path
    runtime: mlx_lm
    model_key: gemma4e4b
    notes: "Download: huggingface-cli download mlx-community/gemma-4-e4b-it-4bit"

  poro8b_mlx:
    label: "Llama-Poro-2-8B-Instruct (4-bit, MLX)"
    path: "/path/to/your/models/Llama-Poro-2-8B-Instruct-mlx-4Bit"   # update to your local path
    runtime: mlx_lm
    model_key: poro8b
    notes: "Download: huggingface-cli download LumiOpen/Llama-Poro-2-8B-Instruct-mlx-4Bit"

  # --- Windows / Linux / Intel Mac (llama.cpp / GGUF) ---
  gemma3_gguf:
    label: "Gemma 3 27B IT (Q4_K_M, GGUF)"
    path: "/path/to/your/models/gemma-3-27b-it-Q4_K_M.gguf"   # update to your local path
    runtime: llama_cpp
    model_key: default
    notes: "Download: huggingface-cli download bartowski/gemma-3-27b-it-GGUF --include 'gemma-3-27b-it-Q4_K_M.gguf'"

  poro8b_gguf:
    label: "Llama-Poro-2-8B-Instruct (Q4_K_M, GGUF)"
    path: "/path/to/your/models/Llama-Poro-2-8B-Instruct-Q4_K_M.gguf"   # update to your local path
    runtime: llama_cpp
    model_key: poro8b
    notes: "Download: huggingface-cli download LumiOpen/Llama-Poro-2-8B-Instruct-GGUF --include '*Q4_K_M*'"

frontier_models:
  # Model IDs are the strings passed directly to each provider's API.
  openai:
    label: "GPT-5.4"
    model_id: gpt-5.4
    runtime: openai          # --provider openai
    env_var: OPENAI_API_KEY

  openai_thinking:
    label: "GPT-5.4 (CoT)"
    model_id: gpt-5.4
    runtime: openai-thinking  # --provider openai-thinking
    env_var: OPENAI_API_KEY
    notes: "Uses Responses API with reasoning; temperature is fixed at 1.0"

  anthropic:
    label: "Claude Sonnet 4.6"
    model_id: claude-sonnet-4-6
    runtime: anthropic        # --provider anthropic
    env_var: ANTHROPIC_API_KEY

  anthropic_thinking:
    label: "Claude Sonnet 4.6 (CoT)"
    model_id: claude-sonnet-4-6
    runtime: anthropic-thinking  # --provider anthropic-thinking
    env_var: ANTHROPIC_API_KEY
    notes: "Extended thinking enabled; temperature is fixed at 1.0"

  google:
    label: "Gemini 3 Flash"
    model_id: gemini-3-flash
    runtime: google           # --provider google
    env_var: GOOGLE_API_KEY

  google_pro:
    label: "Gemini 3.1 Pro"
    model_id: gemini-3.1-pro-preview
    runtime: openrouter       # --provider openrouter (no daily quota)
    env_var: OPENROUTER_API_KEY
    notes: "Route via OpenRouter to avoid Google AI Studio per-day limits"
